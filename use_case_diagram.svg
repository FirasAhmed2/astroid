<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#f9f9fb"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Astroid Dodger — Use Case Diagram</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#555">«UML Use Case Diagram»</text>

  <!-- ══════════════════════════════════════════════
       SYSTEM BOUNDARY
  ══════════════════════════════════════════════ -->
  <rect x="220" y="70" width="660" height="710" rx="10" ry="10"
        fill="#ffffff" stroke="#3a3a6e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="550" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3a6e">Astroid Dodger System</text>

  <!-- ══════════════════════════════════════════════
       ACTOR: PLAYER  (left)
  ══════════════════════════════════════════════ -->
  <!-- stick figure head -->
  <circle cx="90" cy="390" r="22" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- body -->
  <line x1="90" y1="412" x2="90" y2="460" stroke="#1a1a2e" stroke-width="2"/>
  <!-- arms -->
  <line x1="90" y1="425" x2="60" y2="445" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="90" y1="425" x2="120" y2="445" stroke="#1a1a2e" stroke-width="2"/>
  <!-- legs -->
  <line x1="90" y1="460" x2="65" y2="495" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="90" y1="460" x2="115" y2="495" stroke="#1a1a2e" stroke-width="2"/>
  <text x="90" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Player</text>

  <!-- ══════════════════════════════════════════════
       ACTOR: FIREBASE (right)
  ══════════════════════════════════════════════ -->
  <!-- stick figure head -->
  <circle cx="1010" cy="390" r="22" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- body -->
  <line x1="1010" y1="412" x2="1010" y2="460" stroke="#c0392b" stroke-width="2"/>
  <!-- arms -->
  <line x1="1010" y1="425" x2="980" y2="445" stroke="#c0392b" stroke-width="2"/>
  <line x1="1010" y1="425" x2="1040" y2="445" stroke="#c0392b" stroke-width="2"/>
  <!-- legs -->
  <line x1="1010" y1="460" x2="985" y2="495" stroke="#c0392b" stroke-width="2"/>
  <line x1="1010" y1="460" x2="1035" y2="495" stroke="#c0392b" stroke-width="2"/>
  <!-- label -->
  <text x="1010" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">Firebase</text>
  <text x="1010" y="531" text-anchor="middle" font-size="11" fill="#c0392b">«external system»</text>

  <!-- ══════════════════════════════════════════════
       USE CASES — column layout inside boundary
       Left column  x=370  (player-facing)
       Right column x=700  (data/system)
  ══════════════════════════════════════════════ -->

  <!-- UC1: Launch App / View Main Menu -->
  <ellipse cx="370" cy="145" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="150" text-anchor="middle" font-size="12" fill="#1a1a2e">View Main Menu</text>

  <!-- UC2: Select Difficulty -->
  <ellipse cx="370" cy="230" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="235" text-anchor="middle" font-size="12" fill="#1a1a2e">Select Difficulty</text>

  <!-- UC3: Customize Ship -->
  <ellipse cx="370" cy="315" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="320" text-anchor="middle" font-size="12" fill="#1a1a2e">Customize Ship</text>

  <!-- UC4: Play Game -->
  <ellipse cx="370" cy="400" rx="115" ry="28" fill="#d4edda" stroke="#27ae60" stroke-width="2"/>
  <text x="370" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Play Game</text>

  <!-- UC5: Dodge Asteroids -->
  <ellipse cx="370" cy="490" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="495" text-anchor="middle" font-size="12" fill="#1a1a2e">Dodge Asteroids</text>

  <!-- UC6: Collect Power-Ups -->
  <ellipse cx="370" cy="575" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="580" text-anchor="middle" font-size="12" fill="#1a1a2e">Collect Power-Ups</text>

  <!-- UC7: View HUD -->
  <ellipse cx="370" cy="660" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="370" y="665" text-anchor="middle" font-size="12" fill="#1a1a2e">View HUD / Score</text>

  <!-- UC8: View Game Over -->
  <ellipse cx="700" cy="145" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="700" y="150" text-anchor="middle" font-size="12" fill="#1a1a2e">View Game Over</text>

  <!-- UC9: Retry Game -->
  <ellipse cx="700" cy="230" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="700" y="235" text-anchor="middle" font-size="12" fill="#1a1a2e">Retry Game</text>

  <!-- UC10: Return to Main Menu -->
  <ellipse cx="700" cy="315" rx="115" ry="28" fill="#eaf0fb" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="700" y="320" text-anchor="middle" font-size="12" fill="#1a1a2e">Return to Main Menu</text>

  <!-- UC11: Save Player Data -->
  <ellipse cx="700" cy="420" rx="115" ry="28" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="700" y="418" text-anchor="middle" font-size="12" fill="#1a1a2e">Save Player Data</text>
  <text x="700" y="433" text-anchor="middle" font-size="10" fill="#7f5500">(high score, trail, stats)</text>

  <!-- UC12: Load Player Data -->
  <ellipse cx="700" cy="510" rx="115" ry="28" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="700" y="515" text-anchor="middle" font-size="12" fill="#1a1a2e">Load Player Data</text>

  <!-- UC13: Persist Trail Color -->
  <ellipse cx="700" cy="600" rx="115" ry="28" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="700" y="605" text-anchor="middle" font-size="12" fill="#1a1a2e">Persist Trail Color</text>

  <!-- UC14: Authenticate Device -->
  <ellipse cx="700" cy="690" rx="115" ry="28" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="700" y="695" text-anchor="middle" font-size="12" fill="#1a1a2e">Authenticate Device</text>

  <!-- ══════════════════════════════════════════════
       PLAYER → USE CASE ASSOCIATIONS
  ══════════════════════════════════════════════ -->
  <line x1="150" y1="380" x2="255" y2="200" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="385" x2="255" y2="250" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="390" x2="255" y2="330" stroke="#555" stroke-width="1.4"/>
  <line x1="155" y1="395" x2="255" y2="400" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="400" x2="255" y2="480" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="405" x2="255" y2="570" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="410" x2="255" y2="655" stroke="#555" stroke-width="1.4"/>

  <!-- Player → Game Over / Retry / Return  (these are also Player-facing) -->
  <line x1="150" y1="375" x2="585" y2="160" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="378" x2="585" y2="245" stroke="#555" stroke-width="1.4"/>
  <line x1="150" y1="382" x2="585" y2="320" stroke="#555" stroke-width="1.4"/>

  <!-- ══════════════════════════════════════════════
       FIREBASE → USE CASE ASSOCIATIONS
  ══════════════════════════════════════════════ -->
  <line x1="895" y1="390" x2="815" y2="430" stroke="#c0392b" stroke-width="1.4"/>
  <line x1="895" y1="393" x2="815" y2="515" stroke="#c0392b" stroke-width="1.4"/>
  <line x1="895" y1="397" x2="815" y2="605" stroke="#c0392b" stroke-width="1.4"/>
  <line x1="895" y1="400" x2="815" y2="695" stroke="#c0392b" stroke-width="1.4"/>

  <!-- ══════════════════════════════════════════════
       «include» relationships
       Play Game includes: Dodge, Collect, View HUD
  ══════════════════════════════════════════════ -->
  <!-- Play Game → Dodge Asteroids -->
  <line x1="370" y1="428" x2="370" y2="462" stroke="#27ae60" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="370,462 365,450 375,450" fill="#27ae60"/>
  <text x="385" y="447" font-size="10" fill="#27ae60">«include»</text>

  <!-- Play Game → Collect Power-Ups -->
  <line x1="370" y1="428" x2="370" y2="547" stroke="#27ae60" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="370,547 365,535 375,535" fill="#27ae60"/>
  <text x="385" y="490" font-size="10" fill="#27ae60">«include»</text>

  <!-- Play Game → View HUD -->
  <line x1="370" y1="428" x2="370" y2="632" stroke="#27ae60" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="370,632 365,620 375,620" fill="#27ae60"/>
  <text x="385" y="578" font-size="10" fill="#27ae60">«include»</text>

  <!-- ══════════════════════════════════════════════
       «include» Play Game → Save Player Data
  ══════════════════════════════════════════════ -->
  <line x1="485" y1="400" x2="585" y2="420" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="585,420 573,413 573,427" fill="#e67e22"/>
  <text x="504" y="405" font-size="10" fill="#e67e22">«include»</text>

  <!-- ══════════════════════════════════════════════
       «include» View Main Menu → Load Player Data
  ══════════════════════════════════════════════ -->
  <line x1="485" y1="145" x2="585" y2="500" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="585,500 574,489 582,483" fill="#e67e22"/>
  <text x="490" y="310" font-size="10" fill="#e67e22">«include»</text>

  <!-- ══════════════════════════════════════════════
       «include» Customize Ship → Persist Trail Color
  ══════════════════════════════════════════════ -->
  <line x1="485" y1="315" x2="585" y2="595" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="585,595 577,583 587,580" fill="#e67e22"/>
  <text x="490" y="446" font-size="10" fill="#e67e22">«include»</text>

  <!-- ══════════════════════════════════════════════
       «extend» Game Over → Retry / Return to Main Menu
  ══════════════════════════════════════════════ -->
  <line x1="700" y1="173" x2="700" y2="202" stroke="#8e44ad" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="700,173 695,185 705,185" fill="#8e44ad"/>
  <text x="710" y="190" font-size="10" fill="#8e44ad">«extend»</text>

  <line x1="700" y1="258" x2="700" y2="287" stroke="#8e44ad" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="700,258 695,270 705,270" fill="#8e44ad"/>
  <text x="710" y="276" font-size="10" fill="#8e44ad">«extend»</text>

  <!-- ══════════════════════════════════════════════
       «include» Load Player Data → Authenticate Device
  ══════════════════════════════════════════════ -->
  <line x1="700" y1="538" x2="700" y2="662" stroke="#e67e22" stroke-width="1.4" stroke-dasharray="6,3"/>
  <polygon points="700,662 695,650 705,650" fill="#e67e22"/>
  <text x="710" y="602" font-size="10" fill="#e67e22">«include»</text>

  <!-- ══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════ -->
  <rect x="232" y="748" width="640" height="25" rx="4" fill="#f0f0f8" stroke="#aaa" stroke-width="1"/>
  <!-- assoc -->
  <line x1="250" y1="761" x2="280" y2="761" stroke="#555" stroke-width="1.5"/>
  <text x="285" y="765" font-size="11" fill="#333">Association</text>
  <!-- include -->
  <line x1="370" y1="761" x2="400" y2="761" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="400,761 392,757 392,765" fill="#27ae60"/>
  <text x="405" y="765" font-size="11" fill="#27ae60">«include»</text>
  <!-- extend -->
  <line x1="490" y1="761" x2="520" y2="761" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="490,761 498,757 498,765" fill="#8e44ad"/>
  <text x="525" y="765" font-size="11" fill="#8e44ad">«extend»</text>
  <!-- firebase -->
  <line x1="615" y1="761" x2="645" y2="761" stroke="#c0392b" stroke-width="1.5"/>
  <text x="650" y="765" font-size="11" fill="#c0392b">Firebase association</text>

</svg>
