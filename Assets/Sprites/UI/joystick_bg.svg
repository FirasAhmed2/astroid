<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Outer ring — stroke only, no fill -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="4"/>
  <!-- Dashed inner ring at 60% radius (60px) -->
  <circle cx="100" cy="100" r="57" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="10 6"/>
</svg>
